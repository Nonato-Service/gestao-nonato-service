# Configuração Nixpacks para Railway
# NODE_OPTIONS reduz uso de memória no build (evita "Killed" no plano gratuito)

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# Limite de memória no build (evita "Killed"); uma única linha para o mesmo shell
cmds = ["export NODE_OPTIONS=--max-old-space-size=384 && npm run build"]

[start]
cmd = "npm start"
